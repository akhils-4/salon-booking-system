services:

  userdb:
    image: mysql
    container_name: userdb
    ports:
      - "3301:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: userdb
    networks:
      - akhilxdev

  bookingdb:
    image: mysql
    container_name: bookingdb
    ports:
      - "3302:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookingdb
    networks:
      - akhilxdev

  categorydb:
    image: mysql
    container_name: categorydb
    ports:
      - "3303:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: categorydb
    networks:
      - akhilxdev
    
  paymentdb:
    image: mysql
    container_name: paymentdb
    ports:
      - "3304:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: paymentdb
    networks:
      - akhilxdev

  salondb:
    image: mysql
    container_name: salondb
    ports:
      - "3305:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: salondb
    networks:
      - akhilxdev

  service-offeringdb:
    image: mysql
    container_name: service-offeringdb
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: service-offeringdb
    networks:
      - akhilxdev
  eureka:
    image: "akhilxdev/salon-eureka:v1"
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent eureka:8070/actuator/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: eureka
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - akhilxdev

  user:
    image: "akhilxdev/salon-user:v1"
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent user:5001/actuator/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: user
    depends_on:
      userdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "user-service"
      SPRING_DATASOURCE_URL: jdbc:mysql://userdb:3306/userdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - akhilxdev


  booking:
    image: "akhilxdev/salon-booking:v1"
    ports:
      - "5005:5005"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent booking:5005/actuator/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: booking
    depends_on:
      bookingdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "booking-service"
      SPRING_DATASOURCE_URL: jdbc:mysql://bookingdb:3306/bookingdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - akhilxdev

  
  category:
    image: "akhilxdev/salon-category:v1"
    ports:
      - "5003:5003"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent category:5003/actuator/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: category
    depends_on:
      categorydb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "category-service"
      SPRING_DATASOURCE_URL: jdbc:mysql://categorydb:3306/categorydb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - akhilxdev

  
  payment:
    image: "akhilxdev/salon-payment:v1"
    ports:
      - "5006:5006"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent payment:5006/actuator/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: payment
    depends_on:
      paymentdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "payment-service"
      SPRING_DATASOURCE_URL: jdbc:mysql://bookingdb:3306/bookingdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - akhilxdev

  
  salon:
    image: "akhilxdev/salon:v1"
    ports:
      - "5002:5002"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent salon:5002/actuator/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: salon
    depends_on:
      salondb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "salon-service"
      SPRING_DATASOURCE_URL: jdbc:mysql://salondb:3306/salondb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - akhilxdev

  service-offering:
    image: "akhilxdev/salon-service-offering:v1"
    ports:
      - "5004:5004"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent service-offering:5004/actuator/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: service-offering
    depends_on:
      service-offeringdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "salon-service-offering"
      SPRING_DATASOURCE_URL: jdbc:mysql://service-offeringdb:3306/service-offeringdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - akhilxdev

  gateway:
    image: "akhilxdev/salon-gateway:v1"
    ports:
      - "5000:5000"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent gateway:5000/actuator/readiness | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    container_name: gateway
    environment:
      SPRING_APPLICATION_NAME: "gateway-server"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8070/eureka/
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - akhilxdev

networks:
  akhilxdev:
    driver: bridge
